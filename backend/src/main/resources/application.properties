# RouteMind — default profile (H2 in-memory for development)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Common settings
spring.jpa.properties.hibernate.connection.foreign_keys=true
spring.jpa.hibernate.ddl-auto=update
router.enabled=true

# JWT configuration
jwt.secret=${JWT_SECRET:routemind-secret-key-for-jwt-token-signing-min-256-bits}
jwt.expiration-ms=${JWT_EXPIRATION:86400000}
